
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>steam</title>
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <header>
    <div class="logo">STEAM</div>
    <nav>
        <a href="#">Магазин</a>
        <a href="#">Бібліотека</a>
        <a href="#">Спільнота</a>
        <a href="#">Профіль</a>
    </nav>
</header>

<section class="hero">
    <div class="overlay">
        <h1>літні розпродажі стім</h1>
        <p>Досліджуйте майбутнє вже сьогодні!</p>
        <button>Купити зараз</button>
    </div>
</section>

<section class="games">
    <h2>Популярні ігри</h2>

    <div class="game-list">

        <div class="card">
            <img src="https://image.api.playstation.com/vulcan/ap/rnd/202311/2812/ae84720b553c4ce943e9c342621b60f198beda0dbf533e21.jpg">
            <h3>Cyber punk 2077</h3>
            <p>₴799 </p>
             <button>Купити зараз</button>
        </div>

        <div class="card">
            <img src="https://upload.wikimedia.org/wikipedia/uk/b/ba/Star_Wars_Jedi_-_Fallen_Order_boxart.jpg">
            <h3>star war jedi fallen order</h3>
            <p>₴999 </p>
            <button>Купити зараз</button>
        </div>

        <div class="card">
            <img src="https://imgs.crazygames.com/deadly-descent-bzs_16x9/20250818071829/deadly-descent-bzs_16x9-cover?metadata=none&quality=60&width=412">
            <h3>deadly descent</h3>
            <p>₴599 </p>
            <button>Купити зараз</button>
        </div>

        <div class="card">
            <img src="https://upload.wikimedia.org/wikipedia/en/c/c8/Deadrising_boxart.jpg">
            <h3>deadrising</h3>
            <p>₴699</p>
            <button>Купити зараз</button>
        </div>

    </div>
</section>

<footer>
 © 2026 Steam Style
</footer>

</html>
